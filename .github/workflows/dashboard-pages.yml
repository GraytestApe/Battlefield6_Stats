name: Build and Deploy Dashboard

on:
  push:
    branches: ['main']
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dashboard-pages-${{ github.ref }}
  group: dashboard-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest API data
        id: fetch_data
        continue-on-error: true
        env:
          BATTLEFIELD_API_KEY: ${{ secrets.BATTLEFIELD_API_KEY }}
          BATTLEFIELD_APP_ID: ${{ vars.BATTLEFIELD_APP_ID }}
          BATTLEFIELD_PLAYERS_ENDPOINT: ${{ vars.BATTLEFIELD_PLAYERS_ENDPOINT }}
        run: npm run data:fetch

      - name: Warn if fetch step degraded
        if: steps.fetch_data.outcome != 'success'
        run: |
          echo "::warning::Data refresh failed; building with repository fallback data file."

      - name: Build static site
        run: npm run build:app

      - name: Prepare Pages metadata
        uses: actions/configure-pages@v5

      - name: Ensure no-jekyll file
        run: touch dist/.nojekyll

      - name: Build static site
        run: npm run build:app

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
